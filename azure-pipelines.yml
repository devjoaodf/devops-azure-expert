trigger:
  branches:
    include: [ main ]

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs: { versionSpec: "20.x" }
  displayName: Instalar Node
- script: npm ci
  displayName: Dependências
- script: npm test
  displayName: Testes
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: "$(System.DefaultWorkingDirectory)"
    artifact: drop